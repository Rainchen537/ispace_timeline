name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Snapshot lockfile
        run: cp pubspec.lock "${RUNNER_TEMP}/pubspec.lock.before"
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: 3.32.6
          channel: stable
          cache: true
      - name: Resolve locked dependencies
        run: flutter pub get --enforce-lockfile
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
      - name: Build Android debug APK
        run: flutter build apk --debug
      - name: Verify Android release signing gate
        shell: bash
        run: |
          if flutter build apk --release >release-gate.log 2>&1; then
            echo "Unsigned Android release build unexpectedly succeeded." >&2
            exit 1
          fi
          grep -F "Release signing is not configured" release-gate.log
      - name: Verify lockfile stability
        if: always()
        run: cmp "${RUNNER_TEMP}/pubspec.lock.before" pubspec.lock

  ios-build:
    runs-on: macos-14
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Snapshot lockfiles
        run: |
          cp pubspec.lock "${RUNNER_TEMP}/pubspec.lock.before"
          cp ios/Podfile.lock "${RUNNER_TEMP}/Podfile.lock.before"
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: 3.32.6
          channel: stable
          cache: true
      - name: Resolve locked dependencies
        run: flutter pub get --enforce-lockfile
      - name: Pin CocoaPods
        shell: bash
        run: |
          if [[ "$(pod --version 2>/dev/null || true)" != "1.16.2" ]]; then
            sudo gem install cocoapods -v 1.16.2
          fi
          test "$(pod --version)" = "1.16.2"
      - name: Build iOS without code signing
        run: flutter build ios --debug --no-codesign
      - name: Verify lockfile stability
        if: always()
        run: |
          cmp "${RUNNER_TEMP}/pubspec.lock.before" pubspec.lock
          cmp "${RUNNER_TEMP}/Podfile.lock.before" ios/Podfile.lock
